version: '3.8'

services:
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80" # Nginx всередині слухає 80 порт, але назовні ми віддаємо 3000
    volumes:
      # Прокидаємо наш index.html прямо в Nginx
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - external-api-network

  backend-api:
    build: ./external-api
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ISSUER_URI: http://host.docker.internal:8081/realms/spa-realm
    networks:
      - external-api-network

networks:
  external-api-network:
    driver: bridge